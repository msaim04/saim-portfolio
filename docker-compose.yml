services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saim_portfolio
      POSTGRES_USER: saim_app
      POSTGRES_PASSWORD: SaimDbPass2026
    volumes:
    - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U saim_app -d saim_portfolio" ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
    - ./server/.env
    ports:
    - "5000:5000"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
